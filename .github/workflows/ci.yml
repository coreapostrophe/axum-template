name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APP_POSTGRES__RUN_MIGRATIONS: "true"
  APP_POSTGRES__HOST: "127.0.0.1"
  APP_POSTGRES__PORT: "5432"
  APP_POSTGRES__USER: "postgres"
  APP_POSTGRES__PASSWORD: "postgres"
  APP_POSTGRES__DB_NAME: "app"
  APP_POSTGRES__MAINTENANCE_DB: "postgres"
  APP_API__CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
  SQLX_CLI_VERSION: "0.8.6"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rust: [1.95.0, stable]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version ${SQLX_CLI_VERSION} --no-default-features --features rustls,postgres --locked
      - name: Verify SQLx offline metadata
        if: matrix.rust == 'stable'
        run: bash scripts/prepare_sqlx.sh --check
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-targets --all-features
      - name: Build all packages
        run: cargo build --all-targets --all-features
      - name: Build release
        if: matrix.rust == 'stable'
        run: cargo build --release --all-targets --all-features
