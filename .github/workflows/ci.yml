name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APP_POSTGRES__RUN_MIGRATIONS: "true"
  APP_POSTGRES__HOST: "127.0.0.1"
  APP_POSTGRES__PORT: "5432"
  APP_POSTGRES__USER: "postgres"
  APP_POSTGRES__PASSWORD: "postgres"
  APP_POSTGRES__DB_NAME: "app"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [1.95.0, stable]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
      - name: Run database migrations
        run: bash scripts/migrate.sh
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-targets --all-features
      - name: Build all packages
        run: cargo build --all-targets --all-features
      - name: Build release
        run: cargo build --release --all-targets --all-features
