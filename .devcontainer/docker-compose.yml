services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CARGO_TARGET_DIR: /home/vscode/.cache/axum-template/target
      APP_POSTGRES__HOST: postgres
      APP_POSTGRES__PORT: 5432
      APP_POSTGRES__USER: postgres
      APP_POSTGRES__PASSWORD: postgres
      APP_POSTGRES__DB_NAME: app
      APP_POSTGRES__RUN_MIGRATIONS: "true"
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
